<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>

    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .box1 {
            width: 350px;
            padding: 20px;
            border: 1px solid rgb(155, 152, 152);
            background-color: rgb(207, 220, 226);
            border-radius: 5px;
            text-align: center;
            box-shadow: 0px 4px 10px rgba(0, 0, 0, 0.3);
        }

        input {
            width: 90%;
            padding: 8px;
            margin: 8px 0;
            border-radius: 5px;
            border: 1px solid #ccc;
        }

        button {
            background-color: rgb(100, 225, 100);
            border-radius: 5px;
            border: 1px solid #ccc;
            padding: 8px 15px;
            margin-top: 10px;

        }
    </style>

</head>

<body>
    <div class="box1">
        <h1>Reset password</h1>
        {% with messages = get_flashed_messages() %}
        {% if messages %}
        {% for message in messages %}
        {{ message }}
        {% endfor %}
        {% endif %}
        {% endwith %}
        <form id="passwordForm">
            <label for="password">New Password:</label><br>
            <input type="password" id="password" name="password" required><br><br>

            <label for="confirmPassword">Confirm Password:</label><br>
            <input type="password" id="confirmPassword" name="confirmPassword" required><br><br>

            <button type="submit">Update Password</button>
        </form>
        <p id="message"></p>

        <script>
            document.getElementById("passwordForm").addEventListener("submit", async function (event) {
                event.preventDefault();

                const password = document.getElementById("password").value;
                const confirmPassword = document.getElementById("confirmPassword").value;
                const message = document.getElementById("message");

                // Confirm password validation
                if (password !== confirmPassword) {
                    message.style.color = "red";
                    message.innerText = "Passwords do not match";
                    return;
                }

                // Optional password length validation
                if (password.length < 8) {
                    message.style.color = "red";
                    message.innerText = "Password must be at least 8 characters";
                    return;
                }

                try {
                    const response = await fetch("{{url_for('newpassword',userdata=userdata)}}", {
                        method: "PUT",
                        headers: {
                            "Content-Type": "application/json"
                        },
                        body: JSON.stringify({
                            password: password
                        })
                    });

                    const data = await response.json();

                    message.style.color = "green";
                    message.innerText = data.message;

                } catch (error) {
                    message.style.color = "red";
                    message.innerText = "Error updating password";
                }
            });
        </script>
    </div>

</body>

</html>
