<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OTP VERIFICATION</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .box2 {
            width: 500px;
            padding: 20px;
            border: 1px solid rgb(155, 152, 152);
            background-color: rgb(207, 220, 226);
            border-radius: 5px;
            box-shadow: 0px 4px 10px rgba(0, 0, 0, 0.3);
        }

        h3 {
            color: rgb(255, 153, 0);
        }

        button {
            background-color: rgb(141, 214, 51);
            border-radius: 5px;
            padding: 5px 20px;
            margin-top: 10px;
            border: 1px solid #ccc;
        }

        input {
            width: 50%;
            padding: 8px;
            margin: 8px 0;
            border-radius: 5px;
            border: 1px solid #ccc;
        }
    </style>
</head>

<body>
    <div class="box2">
        <center>
            <h1>OTP VERIFICATION</h1>
            {% with messages = get_flashed_messages() %}
            {% if messages %}
            {% for message in messages %}
            <h3>{{ message }}</h3>
            {% endfor %}
            {% endif %}
            {% endwith %}
            <form method="POST">
                <input type="text" name="otp" placeholder="Enter otp" required><br>
                <button>Submit</button>
            </form>
        </center>
    </div>
</body>

</html>
